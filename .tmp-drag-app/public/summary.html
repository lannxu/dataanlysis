<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>人才盘点 · 当场总览</title><link rel="stylesheet" href="/styles.css"></head><body><main class="shell summary-shell"><div class="top"><div><div class="brand">人才盘点 · 当场总览</div><div class="muted"><span class="status-dot"></span><span id="live">数据实时更新</span></div></div><div class="actions"><a class="btn secondary-link" href="/admin.html">返回主持后台</a><button onclick="window.print()">打印 / 保存 PDF</button></div></div>
<section class="kpis" id="kpis"></section>
<div class="overview-grid"><section class="card"><div class="section"><h2>最终九宫格落位</h2><span class="muted" id="moveStatus">可在宫格之间拖动，也可拖到右侧待定区；触屏设备点击姓名调整</span></div><div class="ninebox"><div class="axis-y">潜力 POT　高 → 低</div><div class="nine-grid" id="nineGrid"></div><div class="axis-x">绩效 PL　低 → 高</div></div></section><aside class="card zone pending side-pending" id="pendingDrop" ondragover="event.preventDefault()" ondrop="dropToPending(event)"><div class="section"><h2>待定名单</h2><span class="muted" id="pendingCount"></span></div><p class="muted pending-tip">可将九宫格人员拖入此处待定；讨论确定后再拖回目标宫格</p><div class="zone-list" id="pendingList"></div></aside></div>
<section class="card" style="margin-top:18px"><div class="section"><h2>尚未讨论</h2><span class="muted" id="openCount"></span></div><div class="zone-list" id="openList"></div></section>
<section class="card" style="margin-top:18px"><div class="section"><h2>全场评估明细</h2><a class="btn" href="/api/export.csv">导出 CSV</a></div><div class="table-wrap"><table><thead><tr><th>员工</th><th>部门</th><th>人数</th><th>绩效票数</th><th>潜力票数</th><th>均分</th><th>系统推荐</th><th>讨论结论</th></tr></thead><tbody id="detail"></tbody></table></div></section></main><script>
const $=s=>document.querySelector(s),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const gridOrder=[6,3,1,8,5,2,9,7,4];function people(list,empty='暂无人员'){return list.length?list.map(r=>`<div class="zone-person"><div><b>${esc(r.name)}</b><span>${esc(r.department)} · ${esc(r.role)}</span></div><strong>${r.recommendedGrid?`推荐 ${r.recommendedGrid} 宫`:'暂不推荐'}</strong></div>`).join(''):`<div class="empty">${empty}</div>`}async function moveEmployee(employeeId,grid){if(!Number.isInteger(grid)||grid<1||grid>9)return;$('#moveStatus').textContent='正在调整…';const response=await fetch('/api/decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({employeeId,type:'direct',grid})});const data=await response.json();$('#moveStatus').textContent=response.ok?`已调整到 ${grid} 宫`:data.error}async function moveToPending(employeeId){$('#moveStatus').textContent='正在移入待定区…';const response=await fetch('/api/decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({employeeId,type:'pending'})});const data=await response.json();$('#moveStatus').textContent=response.ok?'已移入待定区':data.error}function draggedId(event){const encoded=event.dataTransfer.getData('text/plain');return encoded?decodeURIComponent(encoded):''}function dropTo(event,grid){event.preventDefault();const employeeId=draggedId(event);if(employeeId)moveEmployee(employeeId,grid)}function dropToPending(event){event.preventDefault();const employeeId=draggedId(event);if(employeeId)moveToPending(employeeId)}function chooseGrid(employeeId,current){const value=window.prompt('请输入目标宫格（1-9），输入 0 移到待定区',String(current));if(value===null)return;const grid=Number(value);if(grid===0){moveToPending(employeeId);return}if(!Number.isInteger(grid)||grid<1||grid>9){$('#moveStatus').textContent='请输入 0–9：0 为待定，1–9 为目标宫格';return}moveEmployee(employeeId,grid)}async function load(){const rows=await fetch('/api/results').then(r=>r.json()),reviewed=rows.filter(r=>r.count>0),direct=rows.filter(r=>r.decision?.type==='direct'),pending=rows.filter(r=>r.decision?.type==='pending'),open=rows.filter(r=>!r.decision);const stats=[['盘点员工',rows.length,'人'],['已参与评估',reviewed.length,'人'],['累计评估票',rows.reduce((s,r)=>s+r.count,0),'票'],['直接落位',direct.length,'人'],['待定',pending.length,'人'],['尚未讨论',open.length,'人']];$('#kpis').innerHTML=stats.map(([label,value,unit])=>`<div class="card kpi"><span>${label}</span><b>${value}</b><small>${unit}</small></div>`).join('');$('#nineGrid').innerHTML=gridOrder.map(n=>{const members=direct.filter(r=>r.decision.grid===n);return`<div class="nine-cell cell-${n}" ondragover="event.preventDefault()" ondrop="dropTo(event,${n})"><div class="cell-title"><b>${n} 宫</b><span>${members.length} 人</span></div><div class="cell-people">${members.length?members.map(r=>`<div class="grid-person name-only" draggable="true" title="拖动或点击调整宫格" ondragstart="event.dataTransfer.setData('text/plain','${encodeURIComponent(r.id)}')" onclick="chooseGrid(decodeURIComponent('${encodeURIComponent(r.id)}'),${r.decision.grid})"><b>${esc(r.name)}</b></div>`).join(''):'<em>—</em>'}</div></div>`}).join('');$('#pendingCount').textContent=`${pending.length} 人`;$('#openCount').textContent=`${open.length} 人`;$('#pendingList').innerHTML=pending.length?pending.map(r=>`<div class="pending-person" draggable="true" title="拖入九宫格，或点击选择宫格" ondragstart="event.dataTransfer.setData('text/plain','${encodeURIComponent(r.id)}')" onclick="chooseGrid(decodeURIComponent('${encodeURIComponent(r.id)}'),${r.recommendedGrid||5})"><b>${esc(r.name)}</b><span>${r.recommendedGrid?`推荐 ${r.recommendedGrid} 宫`:'暂不推荐'}</span></div>`).join(''):'<div class="empty">尚无待定人员</div>';$('#openList').innerHTML=people(open);$('#detail').innerHTML=rows.map(r=>`<tr><td><div class="employee-name">${r.photo?`<img class="thumb" src="${r.photo}" alt="">`:``}<div><b>${esc(r.name)}</b><div class="muted">${esc(r.role)}</div></div></div></td><td>${esc(r.department)}</td><td>${r.count}</td><td><div class="dist">${r.plCounts.map((n,i)=>`<span>PL${i+1} <b>${n}</b></span>`).join('')}</div></td><td><div class="dist">${r.potCounts.map((n,i)=>`<span>POT${i+1} <b>${n}</b></span>`).join('')}</div></td><td>PL <b>${r.count?r.avgPL.toFixed(2):'—'}</b><br>POT <b>${r.count?r.avgPOT.toFixed(2):'—'}</b></td><td><span class="recommend ${r.recommendedGrid?'':'no-recommend'}">${r.recommendedGrid?`PL${r.majorityPL} · POT${r.majorityPOT}<br><b>${r.recommendedGrid} 宫</b>`:'暂不推荐'}</span></td><td>${r.decision?.type==='direct'?`直接落位 · ${r.decision.grid} 宫`:r.decision?.type==='pending'?'待定':'未讨论'}</td></tr>`).join('')}load();function connect(){const ws=new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}`);ws.onmessage=e=>{const m=JSON.parse(e.data);if(['results','employees'].includes(m.type))load()};ws.onclose=()=>{$('#live').textContent='正在重新连接';setTimeout(connect,1200)};ws.onopen=()=>$('#live').textContent='数据实时更新'}connect();
</script></body></html>
