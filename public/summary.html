<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>人才盘点 · 当场总览</title>
  <link rel="stylesheet" href="/styles.css">
  <script defer src="/i18n.js"></script>
</head>
<body>
<main class="shell summary-shell">
  <div class="top">
    <div>
      <div class="brand">人才盘点 · 当场总览</div>
      <div class="muted"><span class="status-dot"></span><span id="live">数据实时更新</span></div>
    </div>
    <div class="actions">
      <a class="btn secondary-link" href="/admin.html">返回主持后台</a>
      <button onclick="window.print()">打印 / 保存 PDF</button>
    </div>
  </div>

  <section class="card initial-filter-card summary-filter-card">
    <div>
      <h2>按 Band 筛选</h2>
      <p class="muted">筛选字段固定读取员工 Excel 中的 Band 列。</p>
    </div>
    <div class="initial-filter-controls">
      <select id="levelFilter"></select>
      <input id="summarySearch" class="summary-search" type="search" placeholder="搜索姓名 / 部门 / 岗位">
      <button class="secondary" id="clearFilter">查看全部</button>
    </div>
  </section>

  <section class="kpis" id="kpis"></section>

  <div class="overview-grid">
    <section class="card">
      <div class="section">
        <div>
          <h2>最终 9-Box 落位</h2>
          <span class="muted" id="filterHint">全部员工</span>
        </div>
        <span class="muted" id="moveStatus">可在Box 之间拖动，也可拖到右侧待定区；触屏设备点击姓名调整</span>
      </div>
      <div class="ninebox">
        <div class="axis-y axis-y-bands"><span>POT3</span><span>POT2</span><span>POT1</span></div>
        <div class="nine-grid" id="nineGrid"></div>
        <div class="axis-x axis-x-bands"><span>PL1-2</span><span>PL3</span><span>PL4-5</span></div>
      </div>
    </section>
    <aside class="card zone pending side-pending" id="pendingDrop" ondragover="event.preventDefault()" ondrop="dropToPending(event)">
      <div class="section"><h2>待定名单</h2><span class="muted" id="pendingCount"></span></div>
      <p class="muted pending-tip">可将9-Box 人员拖入此处待定；讨论确定后再拖回目标 Box</p>
      <div class="zone-list" id="pendingList"></div>
    </aside>
  </div>

  <section class="card" style="margin-top:18px">
    <div class="section"><h2>尚未讨论</h2><span class="muted" id="openCount"></span></div>
    <p class="muted pending-tip">拖动姓名到右侧待定区；触屏设备可点击姓名直接移入待定</p>
    <div class="zone-list" id="openList"></div>
  </section>

  <section class="card" style="margin-top:18px">
    <div class="section"><h2>全场评估明细</h2><a class="btn" href="/api/export.csv">导出 CSV</a></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>员工</th><th>部门</th><th>岗位级别</th><th>人数</th><th>九宫格分布</th><th>均分</th><th>系统推荐</th><th>讨论结论</th></tr></thead>
        <tbody id="detail"></tbody>
      </table>
    </div>
  </section>
</main>

<div class="box-modal" id="boxModal" hidden onclick="if(event.target===this) closeBoxModal()">
  <div class="box-modal-panel" role="dialog" aria-modal="true" aria-labelledby="boxModalTitle">
    <div class="box-modal-head">
      <div>
        <h2 id="boxModalTitle">Box</h2>
        <p class="muted" id="boxModalCount"></p>
      </div>
      <button class="secondary" onclick="closeBoxModal()">关闭</button>
    </div>
    <div class="box-modal-list" id="boxModalList"></div>
  </div>
</div>

<script>
const roomId = new URLSearchParams(location.search).get('room') || 'default';
const roomSuffix = roomId && roomId !== 'default' ? '?room=' + encodeURIComponent(roomId) : '';
const roomUrl = value => {
  const u = new URL(value, location.href);
  if (u.pathname.startsWith('/api/') && roomId) u.searchParams.set('room', roomId);
  return u.pathname + u.search + u.hash;
};
const nativeFetch = window.fetch.bind(window);
window.fetch = (input, init) => nativeFetch(typeof input === 'string' && input.startsWith('/api/') ? roomUrl(input) : input, init);
const wsRoomPath = roomId && roomId !== 'default' ? '/?room=' + encodeURIComponent(roomId) : '';
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('a[href^="/"]').forEach(link => {
    const href = link.getAttribute('href') || '';
    if (!href || href.includes('room=') || href.startsWith('/employee-template')) return;
    const u = new URL(href, location.href);
    if (roomId && roomId !== 'default') u.searchParams.set('room', roomId);
    link.href = u.pathname + u.search + u.hash;
  });
});

const $ = s => document.querySelector(s);
const pct = (value,total) => total ? Math.round(value / total * 100) + '%' : '0%';
const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const gridOrder = [6,3,1,8,5,2,9,7,4];
const levelKeys = ['Band','band','BAND'];
let rows = [];
let activeLevel = '';
let searchQuery = '';
let expandedBox = null;


function gridDistHtml(row){
  const counts = row.gridCounts || Array(9).fill(0);
  return '<div class="detail-nine-dist" aria-label="九宫格票数分布">' + gridOrder.map(box => '<span title="Box ' + box + ': ' + (counts[box - 1] || 0) + ' 票"><small>Box ' + box + '</small><b>' + (counts[box - 1] || 0) + '</b></span>').join('') + '</div>';
}


function updateFinalAxisBands(scope, direct, totalRows){
  const root = typeof scope === 'string' ? document.querySelector(scope) : scope;
  if (!root) return;
  const boxes = direct.map(row => row.decision?.grid).filter(Boolean);
  const total = totalRows.length;
  const plCounts = [boxes.filter(box => [6,8,9].includes(box)).length, boxes.filter(box => [3,5,7].includes(box)).length, boxes.filter(box => [1,2,4].includes(box)).length];
  const potCounts = [boxes.filter(box => [9,7,4].includes(box)).length, boxes.filter(box => [8,5,2].includes(box)).length, boxes.filter(box => [6,3,1].includes(box)).length];
  const xLabels = ['PL1-2','PL3','PL4-5'];
  const yLabels = ['POT3','POT2','POT1'];
  root.querySelectorAll('.axis-x-bands span').forEach((el,index) => el.textContent = xLabels[index] + ' ' + pct(plCounts[index], total));
  root.querySelectorAll('.axis-y-bands span').forEach((el,index) => { const sourceIndex = [2,1,0][index]; el.textContent = yLabels[index] + ' ' + pct(potCounts[sourceIndex], total); });
}

function levelOf(row){
  const fields = row.fields || {};
  const entry = Object.entries(fields).find(([key,value]) => key.trim().toLowerCase() === 'band' && String(value ?? '').trim());
  return entry ? String(entry[1]).trim() : '';
}

function searchableText(row){
  const fields = row.fields || {};
  return [row.name, row.department, row.role, levelOf(row), row.employeeNo || row.id, ...Object.values(fields)].map(value => String(value ?? '').toLowerCase()).join(' ');
}

function filteredRows(){
  const keyword = searchQuery.trim().toLowerCase();
  return rows.filter(row => {
    const levelOk = !activeLevel || levelOf(row) === activeLevel;
    const searchOk = !keyword || searchableText(row).includes(keyword);
    return levelOk && searchOk;
  });
}

function renderFilter(){
  const levels = [...new Set(rows.map(levelOf).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'zh-CN'));
  $('#levelFilter').innerHTML = '<option value="">全部岗位级别</option>' + levels.map(level => '<option value="' + esc(level) + '" ' + (level === activeLevel ? 'selected' : '') + '>' + esc(level) + '</option>').join('');
}

function draggedId(event){
  const encoded = event.dataTransfer.getData('text/plain');
  return encoded ? decodeURIComponent(encoded) : '';
}

function performanceLevelForGrid(grid, currentPl){
  grid = Number(grid);
  const existing = Number(currentPl || 0);
  if ([1,2,4].includes(grid)) {
    const value = window.prompt('这个 Box 包含 PL4 和 PL5，请输入具体绩效：4 或 5', [4,5].includes(existing) ? String(existing) : '4');
    if (value === null) return null;
    const pl = Number(value);
    if (![4,5].includes(pl)) { alert('请输入 4 或 5'); return null; }
    return pl;
  }
  if ([6,8,9].includes(grid)) {
    const value = window.prompt('这个 Box 包含 PL1 和 PL2，请输入具体绩效：1 或 2', [1,2].includes(existing) ? String(existing) : '2');
    if (value === null) return null;
    const pl = Number(value);
    if (![1,2].includes(pl)) { alert('请输入 1 或 2'); return null; }
    return pl;
  }
  if (grid === 3 || grid === 5 || grid === 7) return 3;
  return null;
}

function decisionPlText(row){
  return row?.decision?.pl ? ' · PL' + row.decision.pl : '';
}

function placementSide(box, pl){
  box = Number(box); pl = Number(pl);
  if ([1,2,4].includes(box)) return pl === 4 ? 'left' : pl === 5 ? 'right' : 'center';
  if ([6,8,9].includes(box)) return pl === 1 ? 'left' : pl === 2 ? 'right' : 'center';
  return 'center';
}
function summaryPersonHtml(row){
  return '<div class="grid-person name-only" draggable="true" title="拖动或点击调整 Box；当前 PL' + (row.decision?.pl || '-') + '" ondragstart="event.dataTransfer.setData(\'text/plain\',\'' + encodeURIComponent(row.id) + '\')" onclick="event.stopPropagation();chooseGrid(decodeURIComponent(\'' + encodeURIComponent(row.id) + '\'),' + row.decision.grid + ')"><b>' + esc(row.name) + '</b></div>';
}
function placementLanesHtml(members, box){
  const groups = {left:[],center:[],right:[]};
  members.forEach(row => groups[placementSide(box, row.decision?.pl)].push(row));
  const lane = (side, label) => '<div class="placement-lane ' + side + '">' + (label ? '<small class="placement-lane-label">' + label + '</small>' : '') + groups[side].map(summaryPersonHtml).join('') + '</div>';
  const labels = [1,2,4].includes(Number(box)) ? ['PL4','PL5'] : [6,8,9].includes(Number(box)) ? ['PL1','PL2'] : ['', ''];
  const split = labels[0] || labels[1];
  return '<div class="placement-lanes ' + (split ? 'split' : 'centered') + '">' + lane('left', labels[0]) + lane('center', '') + lane('right', labels[1]) + '</div>';
}

async function moveEmployee(employeeId, grid, pl){
  if (!Number.isInteger(grid) || grid < 1 || grid > 9) return;
  if (pl === undefined) { pl = performanceLevelForGrid(grid); if (pl === null) return; }
  $('#moveStatus').textContent = '正在调整…';
  const response = await fetch('/api/decision', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({employeeId, type:'direct', grid, pl})
  });
  const data = await response.json();
  $('#moveStatus').textContent = response.ok ? '已调整到 Box ' + grid : data.error;
}

async function moveToPending(employeeId){
  $('#moveStatus').textContent = '正在移入待定区…';
  const response = await fetch('/api/decision', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({employeeId, type:'pending'})
  });
  const data = await response.json();
  $('#moveStatus').textContent = response.ok ? '已移入待定区' : data.error;
}

function dropTo(event, grid){
  event.preventDefault();
  const employeeId = draggedId(event);
  if (employeeId) moveEmployee(employeeId, grid);
}

function dropToPending(event){
  event.preventDefault();
  const employeeId = draggedId(event);
  if (employeeId) moveToPending(employeeId);
}

function membersOfBox(box){
  return filteredRows().filter(row => row.decision?.type === 'direct' && row.decision.grid === box);
}

function openBoxModal(box){
  expandedBox = box;
  const members = membersOfBox(box);
  $('#boxModalTitle').textContent = 'Box ' + box;
  $('#boxModalCount').textContent = members.length + ' 人，点击姓名可调整落位';
  $('#boxModalList').innerHTML = members.length ? members.map(row => '<button class="box-modal-person" onclick="chooseGrid(decodeURIComponent(\'' + encodeURIComponent(row.id) + '\'),' + row.decision.grid + '); closeBoxModal();"><span>' + esc(row.name) + '</span></button>').join('') : '<div class="empty">这个 Box 暂时没有人员</div>';
  $('#boxModal').hidden = false;
  document.body.classList.add('modal-open');
}

function closeBoxModal(){
  expandedBox = null;
  $('#boxModal').hidden = true;
  document.body.classList.remove('modal-open');
}

document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && !$('#boxModal').hidden) closeBoxModal();
});

function chooseGrid(employeeId, current){
  const value = window.prompt('请输入目标 Box（1-9），输入 0 移到待定区', String(current));
  if (value === null) return;
  const grid = Number(value);
  if (grid === 0) { moveToPending(employeeId); return; }
  if (!Number.isInteger(grid) || grid < 1 || grid > 9) {
    $('#moveStatus').textContent = '请输入 0-9：0 为待定，1-9 为目标 Box';
    return;
  }
  moveEmployee(employeeId, grid);
}

function render(){
  renderFilter();
  const list = filteredRows();
  const reviewed = list.filter(row => row.count > 0);
  const direct = list.filter(row => row.decision?.type === 'direct');
  const pending = list.filter(row => row.decision?.type === 'pending');
  const open = list.filter(row => !row.decision);
  const box123 = direct.filter(row => [1,2,3].includes(Number(row.decision?.grid))).length;
  $('#filterHint').textContent = (activeLevel ? '当前筛选：' + activeLevel : '全部员工') + (searchQuery ? ' · 搜索：' + searchQuery : '');
  const stats = [
    ['盘点员工', list.length, '人'],
    ['已参与评估', reviewed.length, '人'],
    ['累计评估票', list.reduce((sum,row) => sum + row.count, 0), '票'],
    ['直接落位', direct.length, '人'],
    ['待定', pending.length, '人'],
    ['尚未讨论', open.length, '人'],
    ['Box 1/2/3 整体比例', pct(box123, list.length), box123 + '/' + list.length + ' 人']
  ];
  $('#kpis').innerHTML = stats.map(([label,value,unit]) => '<div class="card kpi"><span>' + label + '</span><b>' + value + '</b><small>' + unit + '</small></div>').join('');
  updateFinalAxisBands('.ninebox', direct, list);
  $('#nineGrid').innerHTML = gridOrder.map(box => {
    const members = direct.filter(row => row.decision.grid === box);
    return '<div class="nine-cell cell-' + box + ' box-zoomable" title="点击放大 Box ' + box + '" onclick="openBoxModal(' + box + ')" ondragover="event.preventDefault()" ondrop="dropTo(event,' + box + ')"><div class="cell-title"><b>Box ' + box + '</b><span>' + members.length + ' 人 · ' + pct(members.length, list.length) + '</span></div><div class="cell-people aligned-cell-people">' +
      (members.length ? placementLanesHtml(members, box) : '<em>—</em>') +
      '</div></div>';
  }).join('');
  $('#pendingCount').textContent = pending.length + ' 人';
  $('#openCount').textContent = open.length + ' 人';
  $('#pendingList').innerHTML = pending.length ? pending.map(row => '<div class="pending-person" draggable="true" title="拖入 9-Box，或点击选择 Box" ondragstart="event.dataTransfer.setData(\'text/plain\',\'' + encodeURIComponent(row.id) + '\')" onclick="chooseGrid(decodeURIComponent(\'' + encodeURIComponent(row.id) + '\'),' + (row.recommendedGrid || 5) + ')"><b>' + esc(row.name) + '</b><span>' + (row.recommendedGrid ? '推荐 Box ' + row.recommendedGrid : '暂不推荐') + '</span></div>').join('') : '<div class="empty">尚无待定人员</div>';
  $('#openList').innerHTML = open.length ? open.map(row => '<div class="zone-person open-person" draggable="true" title="拖到待定区，或点击直接移入待定" ondragstart="event.dataTransfer.setData(\'text/plain\',\'' + encodeURIComponent(row.id) + '\')" onclick="moveToPending(decodeURIComponent(\'' + encodeURIComponent(row.id) + '\'))"><div><b>' + esc(row.name) + '</b><span>' + esc(row.department) + ' · ' + esc(row.role) + '</span></div><strong>' + (row.recommendedGrid ? '推荐 Box ' + row.recommendedGrid : '暂不推荐') + '</strong></div>').join('') : '<div class="empty">暂无人员</div>';
  $('#detail').innerHTML = list.map(row => '<tr>' +
    '<td><div class="employee-name">' + (row.photo ? '<img class="thumb" src="' + row.photo + '" alt="">' : '') + '<div><b>' + esc(row.name) + '</b><div class="muted">' + esc(row.role) + '</div></div></div></td>' +
    '<td>' + esc(row.department) + '</td>' +
    '<td>' + esc(levelOf(row)) + '</td>' +
    '<td>' + row.count + '</td>' +
    '<td>' + gridDistHtml(row) + '</td>' +
    '<td>PL <b>' + (row.count ? row.avgPL.toFixed(2) : '—') + '</b><br>POT <b>' + (row.count ? row.avgPOT.toFixed(2) : '—') + '</b></td>' +
    '<td><span class="recommend ' + (row.recommendedGrid ? '' : 'no-recommend') + '">' + (row.recommendedGrid ? 'Box ' + row.recommendedGrid + '<br><b>' + pct(Math.round((row.recommendedShare || 0) * 100), 100) + '共识</b>' : '暂不推荐') + '</span></td>' +
    '<td>' + (row.decision?.type === 'direct' ? '直接落位 · Box ' + row.decision.grid + decisionPlText(row) : row.decision?.type === 'pending' ? '待定' : '未讨论') + '</td>' +
  '</tr>').join('');
}

async function load(){
  rows = await fetch('/api/results', {cache:'no-store'}).then(r => r.json());
  render();
}

$('#levelFilter').onchange = event => { activeLevel = event.target.value; render(); };
$('#summarySearch').oninput = event => { searchQuery = event.target.value; render(); };
$('#clearFilter').onclick = () => { activeLevel = ''; searchQuery = ''; $('#summarySearch').value = ''; render(); };
load();
function connect(){
  const ws = new WebSocket((location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + wsRoomPath);
  ws.onmessage = event => { const message = JSON.parse(event.data); if (['results','employees'].includes(message.type)) load(); };
  ws.onclose = () => { $('#live').textContent = '正在重新连接'; setTimeout(connect, 1200); };
  ws.onopen = () => $('#live').textContent = '数据实时更新';
}
connect();
</script>
</body>
</html>
