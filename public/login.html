<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Talent Review Tool 4.0 &middot; Login</title><link rel="stylesheet" href="/styles.css"></head><body class="auth-body"><main class="auth-shell"><section class="card auth-card"><div class="brand">人才盘点 4.0</div><h1 id="title">登录</h1><p class="muted" id="hint">登录后进入自己的独立讨论区。</p><form id="form"><label><span>姓名</span><input id="name" autocomplete="name"></label><label><span>账号</span><input id="username" required autocomplete="username"></label><label><span>密码</span><input id="password" type="password" required minlength="8" autocomplete="current-password"></label><button id="submit" type="submit">登录</button><div class="toast" id="message"></div></form></section></main><script>const $=s=>document.querySelector(s);let setup=false;async function init(){const data=await fetch('/api/auth/status',{cache:'no-store'}).then(r=>r.json());if(data.user){location.href='/home.html';return}setup=data.setupRequired;$('#title').textContent=setup?'创建管理员账号':'登录';$('#hint').textContent=setup?'首次使用，请创建管理员账号；现有讨论区将归属该账号。':'登录后只能查看和管理自己创建的讨论区。';$('#submit').textContent=setup?'创建并进入':'登录';$('#name').closest('label').hidden=!setup;$('#password').autocomplete=setup?'new-password':'current-password'}$('#form').onsubmit=async e=>{e.preventDefault();$('#message').textContent='处理中...';const response=await fetch(setup?'/api/auth/setup':'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:$('#name').value.trim(),username:$('#username').value.trim(),password:$('#password').value})});const data=await response.json();if(!response.ok){$('#message').textContent=data.error||'操作失败';return}const next=new URLSearchParams(location.search).get('next');location.href=next&&next.startsWith('/')?next:'/home.html'};init();</script></body></html>
