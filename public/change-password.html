<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>人才盘点 ? 修改密码</title><link rel="stylesheet" href="/styles.css"></head><body class="auth-body"><main class="auth-shell"><section class="card auth-card"><div class="brand">修改密码</div><p class="muted">新密码至少 8 位，不能继续使用初始密码 test12345。</p><form id="form"><label><span>当前密码</span><input id="currentPassword" type="password" required autocomplete="current-password"></label><label><span>新密码</span><input id="newPassword" type="password" required minlength="8" autocomplete="new-password"></label><label><span>确认新密码</span><input id="confirmPassword" type="password" required minlength="8" autocomplete="new-password"></label><button>保存新密码</button><a class="btn secondary-link" href="/home.html">返回讨论区首页</a><div class="toast" id="message"></div></form></section></main><script>const $=s=>document.querySelector(s);$('#form').onsubmit=async e=>{e.preventDefault();if($('#newPassword').value!==$('#confirmPassword').value){$('#message').textContent='两次输入的新密码不一致';return}const response=await fetch('/api/auth/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentPassword:$('#currentPassword').value,newPassword:$('#newPassword').value})});const data=await response.json();if(!response.ok){$('#message').textContent=data.error||'修改失败';return}$('#message').textContent='密码修改成功';e.target.reset()};</script></body></html>
