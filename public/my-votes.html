<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>人才盘点 · 我的初评结果</title>
  <link rel="stylesheet" href="/styles.css">
  <script defer src="/i18n.js"></script>
</head>
<body>
<main class="shell pre-shell">
  <div class="top">
    <div>
      <div class="brand">我的初评结果</div>
      <div class="muted"><span class="status-dot"></span>现场讨论时查看自己之前提交的会前初评记录</div>
    </div>
  </div>

  <section class="card my-current-vote-card">
    <div class="section"><h2>当前被讨论人</h2><span class="muted" id="currentStatus">跟随主持后台实时更新</span></div>
    <div id="currentVoteView"><div class="empty">请输入评估人姓名或编号后查看</div></div>
  </section>

  <section class="card my-votes-card" style="margin-top:16px">
    <div class="pre-toolbar my-votes-toolbar">
      <label>评估人</label>
      <input id="evaluatorName" placeholder="输入提交/导入时使用的姓名或编号">
      <button id="loadVotes">查看结果</button>
    </div>
    <p class="muted pre-skip-tip">如导入了初评结果，请输入导入表里的评估人名称；如是在本机提交，也会自动匹配本机记录。</p>
    <div class="toast" id="status"></div>
  </section>

  <section class="card my-votes-card" style="margin-top:16px">
    <div class="section"><h2>我评估过的全部名单</h2><span class="muted" id="voteCount">--</span></div>
    <div class="my-votes-list" id="myVotesList"><div class="empty">请输入评估人姓名或编号后查看</div></div>
  </section>
</main>

<script>
const params = new URLSearchParams(location.search);
const roomId = params.get('room') || 'default';
const roomUrl = value => {
  const u = new URL(value, location.href);
  if (u.pathname.startsWith('/api/') && roomId) u.searchParams.set('room', roomId);
  return u.pathname + u.search + u.hash;
};
const nativeFetch = window.fetch.bind(window);
window.fetch = (input, init) => nativeFetch(typeof input === 'string' && input.startsWith('/api/') ? roomUrl(input) : input, init);
const $ = s => document.querySelector(s);
const wsRoomPath = roomId && roomId !== 'default' ? '/?room=' + encodeURIComponent(roomId) : '';
let myItems = [];
let currentEmployee = null;
const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function deviceEvaluatorId(){
  try { return localStorage.getItem('preEvaluatorId') || localStorage.getItem('evaluatorId') || ''; } catch { return ''; }
}
function restoreName(){
  try { $('#evaluatorName').value = localStorage.getItem('preEvaluatorName') || ''; } catch {}
}
function saveName(){
  try { localStorage.setItem('preEvaluatorName', $('#evaluatorName').value.trim()); } catch {}
}
function personLine(item){
  return [item.department, item.role].filter(Boolean).join(' · ');
}
function voteText(item){
  if (!item) return '<span class="my-vote-missing">未查询到我的记录</span>';
  if (item.skip) return '<span class="my-vote-skip">Skip</span>';
  return '<span class="recommend">PL' + item.pl + ' / POT' + item.pot + '<br><b>Box ' + item.grid + '</b></span>';
}
function commentText(item){
  if (!item) return '<em>如果你已做过初评，请确认上方输入的评估人名称和导入/提交时一致。</em>';
  return item.comment ? esc(item.comment) : '<em>暂无 Comments</em>';
}
function renderCurrent(){
  const box = $('#currentVoteView');
  if (!currentEmployee) { box.innerHTML = '<div class="empty">等待主持人选择员工</div>'; return; }
  const item = myItems.find(x => x.employeeId === currentEmployee.id);
  box.innerHTML = '<div class="my-current-person">' +
    '<div><b>' + esc(currentEmployee.name) + '</b><span>' + esc([currentEmployee.department, currentEmployee.role].filter(Boolean).join(' · ')) + '</span></div>' +
    '<div>' + voteText(item) + '</div>' +
    '<p>' + commentText(item) + '</p>' +
  '</div>';
  $('#currentStatus').textContent = item ? '已显示你对当前员工的初评' : '当前员工暂未匹配到你的初评';
}
function render(items){
  myItems = items || [];
  $('#voteCount').textContent = myItems.length + ' 条';
  $('#myVotesList').innerHTML = myItems.length ? myItems.map(item =>
    '<div class="my-vote-item">' +
      '<div><b>' + esc(item.name) + '</b><span>' + esc(personLine(item)) + '</span></div>' +
      '<div>' + voteText(item) + '</div>' +
      '<p>' + commentText(item) + '</p>' +
    '</div>'
  ).join('') : '<div class="empty">没有查到记录，请确认评估人姓名/编号是否和提交或导入时一致。</div>';
  renderCurrent();
}
async function loadState(){
  try {
    const data = await fetch('/api/state', {cache:'no-store'}).then(r => r.json());
    currentEmployee = data.employee || null;
    renderCurrent();
  } catch {
    $('#currentStatus').textContent = '同步中断，请确认手机和电脑在同一网络';
  }
}
async function loadVotes(){
  const name = $('#evaluatorName').value.trim();
  const deviceId = deviceEvaluatorId();
  saveName();
  if (!name && !deviceId) {
    $('#status').textContent = '请输入评估人姓名或编号';
    render([]);
    return;
  }
  $('#status').textContent = '正在查询...';
  const query = new URLSearchParams();
  if (name) query.set('evaluatorName', name);
  if (deviceId) query.set('evaluatorId', deviceId);
  const response = await fetch('/api/my-votes?' + query.toString(), {cache:'no-store'});
  const data = await response.json();
  if (!response.ok) {
    $('#status').textContent = data.error || '查询失败';
    render([]);
    return;
  }
  $('#status').textContent = '已查询到 ' + data.total + ' 条记录';
  render(data.items || []);
}
function applyStateMessage(message){
  currentEmployee = message?.data?.employee || currentEmployee;
  renderCurrent();
}
function connect(){
  const ws = new WebSocket((location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + wsRoomPath);
  ws.onmessage = event => {
    const message = JSON.parse(event.data);
    if (message.type === 'state' || message.type === 'current') applyStateMessage(message);
    if (message.type === 'results' || message.type === 'employees') {
      if ($('#evaluatorName').value.trim() || deviceEvaluatorId()) loadVotes(); else loadState();
    }
  };
  ws.onopen = () => { $('#currentStatus').textContent = '已连接，跟随主持后台实时更新'; };
  ws.onclose = () => { $('#currentStatus').textContent = '正在重新连接，同步会自动恢复'; setTimeout(connect, 1200); };
}

$('#loadVotes').onclick = loadVotes;
$('#evaluatorName').addEventListener('keydown', event => { if (event.key === 'Enter') loadVotes(); });
restoreName();
loadState();
connect();
setInterval(loadState, 2000);
if ($('#evaluatorName').value.trim() || deviceEvaluatorId()) loadVotes();
</script>
</body>
</html>
