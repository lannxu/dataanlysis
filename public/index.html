<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>人才盘点评估</title><link rel="stylesheet" href="/styles.css">  <script defer src="/i18n.js"></script>
</head><body class="live-vote-body"><main class="shell" style="max-width:620px"><div class="top"><div><div class="brand">人才盘点评估</div><div class="muted"><span class="status-dot"></span><span id="status">正在连接会议</span></div></div><div class="muted" id="progress">-- / --</div></div><section class="card"><div class="person"><div class="avatar" id="avatar">人</div><h1 id="name">等待后台开始</h1><p id="meta">主持人切换后将自动显示</p><div class="extra-fields" id="extraFields" hidden></div></div><div class="dimension"><h2>绩效等级</h2><div class="options" id="pl"></div></div><div class="dimension"><h2>潜力等级</h2><div class="options pot" id="pot"></div></div><div class="pre-box-preview" id="boxPreview">选择 PL 和 POT 后显示 Box</div><button class="submit" id="submit" disabled>提交评估</button><div class="toast" id="toast"></div></section></main><script>
const roomId = new URLSearchParams(location.search).get('room') || 'default';
const roomSuffix = roomId && roomId !== 'default' ? '?room=' + encodeURIComponent(roomId) : '';
const roomUrl = value => {
  const u = new URL(value, location.href);
  if (u.pathname.startsWith('/api/') && roomId) u.searchParams.set('room', roomId);
  return u.pathname + u.search + u.hash;
};
const nativeFetch = window.fetch.bind(window);
window.fetch = (input, init) => nativeFetch(typeof input === 'string' && input.startsWith('/api/') ? roomUrl(input) : input, init);
const wsRoomPath = roomId && roomId !== 'default' ? '/?room=' + encodeURIComponent(roomId) : '';
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('a[href^="/"]').forEach(link => {
    const href = link.getAttribute('href') || '';
    if (!href || href.includes('room=') || href.startsWith('/employee-template')) return;
    const u = new URL(href, location.href);
    if (roomId && roomId !== 'default') u.searchParams.set('room', roomId);
    link.href = u.pathname + u.search + u.hash;
  });
});

function makeEvaluatorId(){let saved='';try{saved=localStorage.getItem('evaluatorId')||''}catch{}if(saved)return saved;const id=(globalThis.crypto&&typeof globalThis.crypto.randomUUID==='function')?globalThis.crypto.randomUUID():`ev-${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;try{localStorage.setItem('evaluatorId',id)}catch{}return id}const evaluatorId=makeEvaluatorId();let current=null,pl=0,pot=0;const $=s=>document.querySelector(s);function fieldValue(fields,names){const entries=Object.entries(fields||{}),norm=v=>String(v||'').toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g,''),wanted=names.map(norm),hit=entries.find(([key])=>wanted.includes(norm(key)));return hit?hit[1]:''}function renderFields(fields={}){const el=$('#extraFields'),standard=['Dept','Position','Band','EDSP 2025','PL 2025','PL 2024'],standardNorms=new Set(standard.map(x=>x.toLowerCase().replace(/[^a-z0-9]+/g,''))),base=[['Dept',current?.department],['Position',current?.role],['Band',fieldValue(fields,['Band','职级'])],['EDSP 2025',fieldValue(fields,['EDSP 2025','EDSP2025'])],['PL 2025',fieldValue(fields,['PL 2025','PL2025'])],['PL 2024',fieldValue(fields,['PL 2024','PL2024'])]],entries=base.concat(Object.entries(fields).filter(([label,value])=>String(value??'').trim()&&!standardNorms.has(String(label).toLowerCase().replace(/[^a-z0-9]+/g,'')))).filter(([,value])=>String(value??'').trim());el.replaceChildren(...entries.map(([label,value])=>{const item=document.createElement('div'),key=document.createElement('span'),val=document.createElement('b');key.textContent=label;val.textContent=value;item.append(key,val);return item}));el.hidden=!entries.length}function boxFromLevels(plValue,potValue){if(!plValue||!potValue)return null;const group=plValue>=4?'H':plValue===3?'M':'L';return ({'H,3':1,'H,2':2,'H,1':4,'M,3':3,'M,2':5,'M,1':7,'L,3':6,'L,2':8,'L,1':9})[group+','+potValue]||null}function updateBoxPreview(){const el=$('#boxPreview');if(!el)return;const box=boxFromLevels(pl,pot);el.textContent=box?'当前选择：PL'+pl+' / POT'+pot+' → Box '+box:'选择 PL 和 POT 后显示 Box';el.classList.toggle('active',!!box)}function options(id,n,prefix){const el=$(id);for(let i=1;i<=n;i++){const b=document.createElement('button');b.className='choice';b.textContent=prefix+i;b.onclick=()=>{if(id==='#pl')pl=i;else pot=i;[...el.children].forEach((x,j)=>x.classList.toggle('active',j===i-1));$('#submit').disabled=!(pl&&pot);updateBoxPreview()};el.appendChild(b)}}options('#pl',5,'PL');options('#pot',3,'POT');async function render(s){current=s.employee;$('#progress').textContent=s.total?`${s.currentIndex+1} / ${s.total}`:'-- / --';if(!current)return;$('#avatar').innerHTML=current.photo?`<img src="${current.photo}" alt="${current.name}">`:current.name.slice(-1);$('#name').textContent=current.name;$('#meta').textContent=current.id?'Employee No: '+(current.employeeNo||current.id):'--';renderFields(current.fields);pl=pot=0;document.querySelectorAll('.choice').forEach(x=>x.classList.remove('active'));$('#submit').disabled=true;updateBoxPreview();$('#toast').textContent='';const v=await fetch(`/api/my-vote?employeeId=${encodeURIComponent(current.id)}&evaluatorId=${encodeURIComponent(evaluatorId)}`).then(r=>r.json());if(v){document.querySelectorAll('#pl .choice')[v.pl-1]?.click();document.querySelectorAll('#pot .choice')[v.pot-1]?.click();$('#toast').textContent='已提交过，可修改'}}fetch('/api/state',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('state');return r.json()}).then(render).catch(()=>{$('#status').textContent='无法连接后台，请检查网络';$('#meta').textContent='请确认手机与电脑连接同一 Wi-Fi'});function connect(){const ws=new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}`);ws.onopen=()=>$('#status').textContent='已连接，自动同步';ws.onmessage=e=>{const m=JSON.parse(e.data);if(['state','current','employees'].includes(m.type))render(m.data)};ws.onclose=()=>{$('#status').textContent='正在重连';setTimeout(connect,1200)}}connect();$('#submit').onclick=async()=>{const r=await fetch('/api/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({evaluatorId,employeeId:current.id,pl,pot})});const d=await r.json();$('#toast').textContent=r.ok?'✓ 评估已提交':d.error};
</script></body></html>
