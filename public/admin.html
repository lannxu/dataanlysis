<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>人才盘点后台</title><link rel="stylesheet" href="/styles.css"></head><body><main class="shell"><div class="top"><div><div class="brand">人才盘点 · 主持后台</div><div class="muted"><span class="status-dot"></span>手机端实时同步</div></div><div class="actions"><a class="btn secondary-link" href="/summary.html">查看当场总览</a><a class="btn" href="/api/export.csv">导出结果 CSV</a></div></div><div class="grid"><section class="card qr"><div class="section"><h2>扫码加入</h2></div><img id="qr" alt="手机评估二维码"><div class="qr-edit"><input id="qrAddress" aria-label="手机访问地址"><button id="refreshQr">重新生成</button></div><a class="url" id="url" target="_blank"></a><div class="qr-tip">二维码会自动跟随当前域名、HTTPS 和端口；本地使用时手机与电脑需连接同一 Wi-Fi，也可手动修改地址后重新生成。</div><hr style="border:0;border-top:1px solid #edf0f5;margin:20px 0"><div class="person" style="padding:5px"><div class="avatar" id="avatar">人</div><h1 id="name">--</h1><p id="meta">--</p></div><div class="controls"><button class="secondary" id="prev">上一位</button><span class="count" id="progress">-- / --</span><button id="next">下一位</button></div></section><section class="card"><div class="section"><h2>实时结果</h2><span class="muted">重复提交覆盖上次选择</span></div><div class="table-wrap"><table><thead><tr><th>员工姓名</th><th>绩效分布</th><th>潜力分布</th><th>系统推荐</th><th>讨论结论</th></tr></thead><tbody id="results"></tbody></table></div></section></div><div class="decision-grid"><section class="card zone direct"><div class="section"><h2>直接落位区</h2><span class="muted" id="directCount">0 人</span></div><div class="zone-list" id="directZone"><div class="empty">尚无人选</div></div></section><section class="card zone pending"><div class="section"><h2>待定区</h2><span class="muted" id="pendingCount">0 人</span></div><div class="zone-list" id="pendingZone"><div class="empty">尚无人选</div></div></section></div><div id="decisionMsg" class="toast"></div><section class="card" style="margin-top:18px"><div class="section"><h2>员工名单</h2><span class="muted">每行：编号,姓名,部门,岗位</span></div><div class="upload-tools"><a class="btn secondary-link" href="/employee-template.xlsx" download>下载 Excel 模板</a><label class="btn file-btn">上传 Excel 名单<input id="employeeFile" type="file" accept=".xlsx" hidden></label><span class="muted" id="uploadStatus">上传后先预览，不会自动覆盖</span></div><textarea class="employees" id="employees"></textarea><div style="margin-top:12px"><button id="save">确认并保存名单</button> <span class="muted" id="saved"></span></div></section></main><script>
const $=s=>document.querySelector(s);let state=null,uploadedPhotos={};const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function recommendation(r){if(!r.recommendedGrid)return'暂不推荐';return`PL${r.majorityPL} · POT${r.majorityPOT}<br><b>九宫格 ${r.recommendedGrid}</b>`}function barChart(values,prefix){const max=Math.max(1,...values);return`<div class="mini-bars">${values.map((n,i)=>`<div class="bar-item"><span>${n}</span><div class="bar-track"><i style="height:${n?Math.max(8,n/max*100):0}%"></i></div><small>${prefix}${i+1}</small></div>`).join('')}</div>`}async function loadState(){state=await fetch('/api/state').then(r=>r.json());const e=state.employee;$('#progress').textContent=`${state.currentIndex+1} / ${state.total}`;$('#name').textContent=e?.name||'--';$('#avatar').innerHTML=e?.photo?`<img src="${e.photo}" alt="${esc(e.name)}">`:(e?.name?.slice(-1)||'人');$('#meta').textContent=[e?.department,e?.role].filter(Boolean).join(' · ')||'--';$('#prev').disabled=state.currentIndex<=0;$('#next').disabled=state.currentIndex>=state.total-1}async function loadResults(){const rows=await fetch('/api/results').then(r=>r.json());uploadedPhotos=Object.fromEntries(rows.filter(r=>r.photo).map(r=>[r.id,r.photo]));$('#results').innerHTML=rows.map(r=>`<tr><td class="result-name"><b>${esc(r.name)}</b></td><td>${barChart(r.plCounts,'PL')}</td><td>${barChart(r.potCounts,'POT')}</td><td><span class="recommend ${r.recommendedGrid?'':'no-recommend'}">${recommendation(r)}</span></td><td><div class="decision-controls"><select id="grid-${encodeURIComponent(r.id)}">${[1,2,3,4,5,6,7,8,9].map(n=>`<option value="${n}" ${n===(r.decision?.grid||r.recommendedGrid)?'selected':''}>${n}宫</option>`).join('')}</select><button onclick="decide(decodeURIComponent('${encodeURIComponent(r.id)}'),'direct')">直接落位</button><button class="secondary" onclick="decide(decodeURIComponent('${encodeURIComponent(r.id)}'),'pending')">待定</button></div></td></tr>`).join('');renderZones(rows);$('#employees').value=rows.map(r=>[r.id,r.name,r.department,r.role].join(',')).join('\n')}function renderZones(rows){const direct=rows.filter(r=>r.decision?.type==='direct'),pending=rows.filter(r=>r.decision?.type==='pending');$('#directCount').textContent=`${direct.length} 人`;$('#pendingCount').textContent=`${pending.length} 人`;$('#directZone').innerHTML=direct.length?direct.map(r=>`<div class="zone-person"><div><b>${esc(r.name)}</b><span>${esc(r.department)}</span></div><strong>${r.decision.grid} 宫</strong></div>`).join(''):'<div class="empty">尚无人选</div>';$('#pendingZone').innerHTML=pending.length?pending.map(r=>`<div class="zone-person"><div><b>${esc(r.name)}</b><span>${esc(r.department)}</span></div><strong>${r.recommendedGrid?`推荐 ${r.recommendedGrid} 宫`:'暂不推荐'}</strong></div>`).join(''):'<div class="empty">尚无人选</div>'}async function decide(employeeId,type){const select=document.getElementById(`grid-${encodeURIComponent(employeeId)}`),grid=Number(select?.value);const response=await fetch('/api/decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({employeeId,type,grid})});const data=await response.json();$('#decisionMsg').textContent=response.ok?(type==='direct'?'已放入直接落位区':'已放入待定区'):data.error}async function go(i){await fetch('/api/current',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({index:i})})}$('#prev').onclick=()=>go(state.currentIndex-1);$('#next').onclick=()=>go(state.currentIndex+1);$('#employeeFile').onchange=async event=>{const file=event.target.files[0];if(!file)return;$('#uploadStatus').textContent='正在读取名单…';const response=await fetch('/api/import-employees',{method:'POST',headers:{'Content-Type':'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'},body:file});const data=await response.json();if(!response.ok){$('#uploadStatus').textContent=data.error;return}uploadedPhotos=Object.fromEntries(data.employees.filter(e=>e.photo).map(e=>[e.id,e.photo]));$('#employees').value=data.employees.map(e=>[e.id,e.name,e.department,e.role].join(',')).join('\n');$('#uploadStatus').textContent=`已读取 ${data.count} 人，其中 ${data.photoCount} 人有照片；请核对后点击“确认并保存名单”`;event.target.value=''};$('#save').onclick=async()=>{const employees=$('#employees').value.split(/\r?\n/).filter(Boolean).map(line=>{const[id,name,department,role]=line.split(/[,，\t]/).map(x=>x.trim());return{id,name,department,role,photo:uploadedPhotos[id]||''}});const r=await fetch('/api/employees',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({employees})});const d=await r.json();$('#saved').textContent=r.ok?`已保存 ${d.total} 人`:d.error;if(r.ok)loadResults()};async function loadQr(custom=''){const q=await fetch(`/api/qr${custom?`?url=${encodeURIComponent(custom)}`:''}`).then(r=>r.json());$('#qrAddress').value=q.url;$('#url').textContent=q.url;$('#url').href=q.url;$('#qr').src=`${q.svgUrl}&v=${Date.now()}`}$('#refreshQr').onclick=()=>loadQr($('#qrAddress').value.trim());loadQr();loadState();loadResults();function connect(){const ws=new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}`);ws.onmessage=e=>{const m=JSON.parse(e.data);if(['state','current','employees'].includes(m.type))loadState();if(['results','employees'].includes(m.type))loadResults()};ws.onclose=()=>setTimeout(connect,1200)}connect();
</script></body></html>
