<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>人才盘点 ? 账号管理</title><link rel="stylesheet" href="/styles.css"></head><body><main class="shell account-shell"><div class="top"><div><div class="brand">账号管理</div><div class="muted">管理员只负责账号，不会看到员工创建的讨论区。</div></div><div class="actions"><a class="btn secondary-link" href="/home.html">返回讨论区首页</a></div></div><section class="card account-create"><div><h2>创建员工账号</h2><p class="muted">员工登录后拥有独立讨论区，初始密码统一为 <b>test12345</b>。</p></div><form id="createForm" class="account-form"><input id="name" placeholder="员工姓名" required><input id="username" placeholder="登录账号" required><button>创建账号</button></form><div class="toast" id="message"></div></section><section class="card"><div class="section"><h2>账号列表</h2><span class="muted" id="count"></span></div><div class="account-list" id="list"></div></section></main><script>const $=s=>document.querySelector(s),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let users=[];async function api(url,options){const r=await fetch(url,options);if(r.status===401){location.href='/login.html?next=/accounts.html';throw Error('login')}const d=await r.json();if(!r.ok)throw Error(d.error||'操作失败');return d}async function load(){users=await api('/api/accounts');$('#count').textContent=users.length+' 个账号';$('#list').innerHTML=users.map(u=>'<div class="account-row"><div><b>'+esc(u.name||u.username)+'</b><span>'+esc(u.username)+' \u00b7 '+(u.role==='admin'?'管理员':'员工')+'</span></div><span class="account-state '+(u.enabled?'enabled':'disabled')+'">'+(u.enabled?'已启用':'已停用')+'</span><div class="account-actions">'+(u.role==='admin'?'':'<button class="secondary" data-action="toggle" data-id="'+u.id+'">'+(u.enabled?'停用':'启用')+'</button><button class="secondary" data-action="reset" data-id="'+u.id+'">重置密码</button>')+'</div></div>').join('')}$('#list').onclick=e=>{const button=e.target.closest('button[data-action]');if(!button)return;const user=users.find(x=>x.id===button.dataset.id);if(!user)return;if(button.dataset.action==='toggle')toggleAccount(user.id,!user.enabled);else resetPassword(user.id)};$('#createForm').onsubmit=async e=>{e.preventDefault();try{await api('/api/accounts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:$('#name').value.trim(),username:$('#username').value.trim()})});e.target.reset();$('#message').textContent='账号已创建';await load()}catch(error){$('#message').textContent=error.message}};async function toggleAccount(id,enabled){try{await api('/api/accounts/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled})});await load()}catch(error){alert(error.message)}}async function resetPassword(id){if(!confirm('\u786e\u5b9a\u5c06\u8be5\u8d26\u53f7\u5bc6\u7801\u91cd\u7f6e\u4e3a test12345 \u5417\uff1f'))return;try{await api('/api/accounts/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({resetPassword:true})});alert('\u5bc6\u7801\u5df2\u91cd\u7f6e\u4e3a test12345')}catch(error){alert(error.message)}}load().catch(error=>{$('#message').textContent=error.message});</script></body></html>
