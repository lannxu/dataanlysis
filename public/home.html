<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>人才盘点 · 讨论区首页</title>
  <link rel="stylesheet" href="/styles.css">
  <script defer src="/i18n.js"></script>
</head>
<body>
<main class="shell rooms-shell">
  <div class="top">
    <div>
      <div class="brand">人才盘点 · 讨论区首页</div>
      <div class="muted"><span class="status-dot"></span>每个讨论区都有独立二维码和独立数据</div>
    </div>
  </div>

  <section class="home-account-bar"><div><b id="currentUser">当前账号</b><span class="muted">仅显示你创建的讨论区</span></div><div class="actions"><a class="btn secondary-link" href="/change-password.html">修改密码</a><a class="btn secondary-link" id="accountLink" href="/accounts.html" hidden>账号管理</a><button class="secondary" id="logout">退出登录</button></div></section>

  <section class="card room-create-card">
    <div>
      <h2>新建讨论区</h2>
      <p class="muted">例如：销售团队、研发团队、M3 层级、华东区。创建后可单独上传名单、单独扫码评估。</p>
    </div>
    <div class="room-create-form">
      <input id="roomName" placeholder="输入讨论区名称">
      <button id="createRoom">创建讨论区</button>
    </div>
    <div class="toast" id="roomMsg"></div>
  </section>

  <section class="rooms-grid" id="roomsGrid"></section>
</main>
<script>
const $ = s => document.querySelector(s);
const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function loadAccount(){const response=await fetch('/api/auth/status',{cache:'no-store'});const data=await response.json();if(!data.user){location.href='/login.html?next=/home.html';return false}$('#currentUser').textContent=data.user.name||data.user.username;$('#accountLink').hidden=data.user.role!=='admin';return true}
$('#logout').onclick=async()=>{await fetch('/api/auth/logout',{method:'POST'});location.href='/login.html'};
function roomUrl(path, id){ const u = new URL(path, location.origin); if (id && id !== 'default') u.searchParams.set('room', id); return u.pathname + u.search; }
function abs(path, id){ return new URL(roomUrl(path, id), location.origin).toString(); }
async function loadRooms(){
  const rooms = await fetch('/api/rooms', {cache:'no-store'}).then(r => r.json());
  $('#roomsGrid').innerHTML = rooms.map(room => {
    const qr = '/api/qr.svg?room=' + encodeURIComponent(room.id);
    return '<article class="card room-card' + (room.locked ? ' room-locked' : '') + '">' +
      '<div class="room-card-head"><div><h2>' + esc(room.name) + '</h2><p class="muted">' + esc(room.id) + ' · ' + (room.total || 0) + ' 人</p></div>' +
      '<div class="room-card-tools"><span class="room-lock-status">' + (room.locked ? '已锁定' : '讨论区') + '</span><div class="room-manage-actions">' +
      '<button type="button" class="room-lock-action' + (room.locked ? ' active' : '') + '" onclick="toggleRoomLock(decodeURIComponent(\'' + encodeURIComponent(room.id) + '\'),' + (!room.locked) + ',decodeURIComponent(\'' + encodeURIComponent(room.name) + '\'))">' + (room.locked ? '解锁' : '锁定') + '</button>' +
      (room.locked ? '' : '<button type="button" onclick="renameRoom(decodeURIComponent(\'' + encodeURIComponent(room.id) + '\'),decodeURIComponent(\'' + encodeURIComponent(room.name) + '\'))">更名</button>' + (room.id === 'default' ? '' : '<button type="button" class="danger" onclick="deleteRoom(decodeURIComponent(\'' + encodeURIComponent(room.id) + '\'),decodeURIComponent(\'' + encodeURIComponent(room.name) + '\'))">删除</button>')) + '</div></div></div>' +
      '<div class="room-card-body"><div class="room-qr-wrap"><img class="room-qr" src="' + qr + '" alt="' + esc(room.name) + ' 二维码"><span>现场扫码投票</span></div>' +
      '<div class="room-main-links"><a class="url" target="_blank" href="' + roomUrl('/index.html', room.id) + '">' + esc(abs('/index.html', room.id)) + '</a>' +
      '<div class="room-actions">' +
        '<a class="room-action primary" href="' + roomUrl('/admin.html', room.id) + '"><b>主持后台</b><span>现场投屏与讨论</span></a>' +
        '<a class="room-action" href="' + roomUrl('/pre.html', room.id) + '"><b>会前初评</b><span>提前发给评委</span></a>' +
        '<a class="room-action highlight" href="' + roomUrl('/initial-results.html', room.id) + '"><b>初评结果</b><span>看初评 9-Box</span></a>' +
        '<a class="room-action highlight" href="' + roomUrl('/summary.html', room.id) + '"><b>当场总览</b><span>看最终 9-Box</span></a>' +
      '</div></div></div>' +
    '</article>';
  }).join('') || '<div class="card empty">暂无讨论区</div>';
}
async function toggleRoomLock(id, locked, name){
  const message = locked
    ? '确定锁定讨论区“' + name + '”吗？锁定后仍可查看和导出，但不能修改名单、投票、讨论记录或落位结果。'
    : '确定解锁讨论区“' + name + '”吗？解锁后可以继续修改数据。';
  if (!confirm(message)) return;
  const response = await fetch('/api/rooms/' + encodeURIComponent(id) + '/lock', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({locked})});
  const data = await response.json();
  $('#roomMsg').textContent = response.ok ? (locked ? '已锁定：' : '已解锁：') + name : data.error;
  if (response.ok) await loadRooms();
}

async function renameRoom(id, currentName){
  const entered = prompt('请输入新的讨论区名称', currentName);
  if (entered === null) return;
  const name = entered.trim();
  if (!name || name === currentName) return;
  const response = await fetch('/api/rooms/' + encodeURIComponent(id), {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
  const data = await response.json();
  $('#roomMsg').textContent = response.ok ? '已更名为：' + data.name : data.error;
  if (response.ok) await loadRooms();
}

async function deleteRoom(id, name){
  if (!confirm('确定删除讨论区“' + name + '”吗？该讨论区的名单、评估和讨论结果都会永久删除。')) return;
  const response = await fetch('/api/rooms/' + encodeURIComponent(id), {method:'DELETE'});
  const data = await response.json();
  $('#roomMsg').textContent = response.ok ? '已删除：' + name : data.error;
  if (response.ok) await loadRooms();
}

$('#createRoom').onclick = async () => {
  const name = $('#roomName').value.trim();
  if (!name) { $('#roomMsg').textContent = '请输入讨论区名称'; return; }
  const response = await fetch('/api/rooms', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
  const data = await response.json();
  $('#roomMsg').textContent = response.ok ? '已创建：' + data.name : data.error;
  if (response.ok) { $('#roomName').value = ''; await loadRooms(); }
};
loadAccount().then(ok=>{if(ok)loadRooms()});
</script>
</body>
</html>
